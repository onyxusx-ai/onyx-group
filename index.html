<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ONYX GROUP</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #ffffff;
  color: #111;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 30px;
}

.header {
  font-size: 40px;
  font-weight: bold;
}

.sub {
  color: gray;
  margin-top: 5px;
}

.search {
  width: 100%;
  padding: 15px;
  margin-top: 20px;
  border: 1px solid #ddd;
  border-radius: 12px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 30px;
}

.card {
  border: 1px solid #eee;
  border-radius: 16px;
  padding: 20px;
  transition: 0.2s;
}

.card:hover {
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

.price {
  margin-top: 10px;
  color: gray;
}

.total {
  font-weight: bold;
  margin-top: 10px;
}

.btn {
  width: 100%;
  padding: 10px;
  margin-top: 15px;
  background: black;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="container">

  <div class="header">ONYX GROUP</div>
  <div class="sub">Товары из Китая с доставкой в Россию</div>

  <input class="search" id="search" placeholder="Поиск товара...">

  <div class="grid" id="grid"></div>

</div>

<script>
const products = [
  {name:"AirPods Pro 2", price:156, weight:0.2},
  {name:"iPhone Case", price:20, weight:0.1},
  {name:"Nike Hoodie", price:45, weight:0.6},
  {name:"Smart Watch", price:120, weight:0.3},
  {name:"Jordan Shoes", price:210, weight:1.2}
];

const grid = document.getElementById("grid");
const search = document.getElementById("search");

function render(list){
  grid.innerHTML = "";

  list.forEach(p => {

    const delivery = Math.round(p.weight * 45 + 15);
    const total = p.price + delivery;

    grid.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <div class="price">Цена: $${p.price}</div>
        <div class="price">Доставка: $${delivery}</div>
        <div class="total">Итого: $${total}</div>
        <button class="btn">Заказать</button>
      </div>
    `;
  });
}

render(products);

search.addEventListener("input", e => {
  const value = e.target.value.toLowerCase();
  render(products.filter(p => p.name.toLowerCase().includes(value)));
});
</script>

</body>
</html>
