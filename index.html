<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ONYX GROUP</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
  color:#111;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:25px;
}

.header{
  font-size:34px;
  font-weight:800;
}

.sub{
  color:#777;
  margin-top:5px;
}

.search{
  width:100%;
  padding:14px;
  margin-top:20px;
  border-radius:12px;
  border:1px solid #ddd;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  margin-top:25px;
}

.card{
  background:#fff;
  padding:18px;
  border-radius:16px;
  transition:0.2s;
}

.card:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.price{
  color:#666;
  font-size:14px;
  margin-top:5px;
}

.total{
  font-weight:bold;
  margin-top:10px;
}

.btn{
  width:100%;
  margin-top:12px;
  padding:10px;
  border:none;
  background:#111;
  color:#fff;
  border-radius:10px;
  cursor:pointer;
}

.cart{
  position:fixed;
  right:20px;
  top:20px;
  background:#111;
  color:#fff;
  padding:12px 16px;
  border-radius:12px;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

  <div class="header">ONYX GROUP</div>
  <div class="sub">Китайские товары с доставкой в Россию</div>

  <input class="search" id="search" placeholder="Поиск товара...">

  <div class="grid" id="grid"></div>

</div>

<div class="cart" onclick="order()">
🛒 Заказать
</div>

<script>

const products = [
  {name:"AirPods Pro 2", price:156, weight:0.2},
  {name:"Nike Hoodie", price:45, weight:0.6},
  {name:"Jordan Shoes", price:210, weight:1.2},
  {name:"Smart Watch", price:120, weight:0.3},
  {name:"iPhone Case", price:20, weight:0.1},
  {name:"Gaming Mouse", price:35, weight:0.2}
];

let cart = [];

const grid = document.getElementById("grid");
const search = document.getElementById("search");

function render(list){
  grid.innerHTML = "";

  list.forEach((p,i)=>{

    const delivery = Math.round(p.weight * 45 + 15);
    const total = p.price + delivery;

    grid.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>

        <div class="price">Цена: $${p.price}</div>
        <div class="price">Доставка: $${delivery}</div>

        <div class="total">Итого: $${total}</div>

        <button class="btn" onclick="add(${i})">
          В корзину
        </button>
      </div>
    `;
  });
}

function add(i){
  cart.push(products[i]);
}

function order(){

  if(cart.length === 0){
    alert("Корзина пустая");
    return;
  }

  let text = "🔥 ONYX GROUP ORDER:%0A";

  cart.forEach(p=>{
    text += `- ${p.name} $${p.price}%0A`;
  });

  // Telegram (вставишь сам TOKEN и CHAT_ID)
  window.open(
    `https://api.telegram.org/botTOKEN/sendMessage?chat_id=CHAT_ID&text=${text}`
  );
}

render(products);

search.addEventListener("input", e=>{
  const v = e.target.value.toLowerCase();
  render(products.filter(p=>p.name.toLowerCase().includes(v)));
});

</script>

</body>
</html>
