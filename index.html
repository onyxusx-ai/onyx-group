<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ONYX GROUP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f4f4;
}

header{
  background:#fff;
  padding:18px 25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  border-bottom:1px solid #eee;
}

.logo{
  font-weight:900;
  font-size:20px;
}

.btn{
  background:#111;
  color:#fff;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  border:none;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.hero{
  background:#fff;
  padding:25px;
  border-radius:18px;
  margin-top:20px;
}

.search{
  width:100%;
  margin-top:15px;
  padding:14px;
  border-radius:12px;
  border:1px solid #ddd;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
  margin-top:25px;
}

.card{
  background:#fff;
  padding:18px;
  border-radius:16px;
}

.title{
  font-weight:700;
}

.small{
  color:#777;
  font-size:13px;
}

.total{
  font-weight:800;
  margin-top:8px;
}

.actions{
  display:flex;
  gap:8px;
  margin-top:12px;
}

.add{
  flex:1;
}

.del{
  background:#eee;
  border:none;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

/* CART */
.cartBtn{
  position:fixed;
  right:20px;
  bottom:20px;
  background:#111;
  color:#fff;
  padding:14px 16px;
  border-radius:14px;
  cursor:pointer;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modalBox{
  background:#fff;
  width:350px;
  padding:20px;
  border-radius:16px;
}

.item{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
  font-size:14px;
}
</style>

</head>

<body>

<header>
  <div class="logo">ONYX GROUP</div>
  <button class="btn" onclick="openAdmin()">Админ</button>
</header>

<div class="container">

  <div class="hero">
    <h2>Китайские товары с доставкой</h2>
    <input class="search" id="search" placeholder="Поиск...">
  </div>

  <div class="grid" id="grid"></div>

</div>

<div class="cartBtn" onclick="openCart()">
🛒 Корзина
</div>

<!-- CART MODAL -->
<div class="modal" id="cart">
  <div class="modalBox">
    <h3>Корзина</h3>
    <div id="cartItems"></div>
    <hr>
    <div id="sum"></div>
    <button class="btn" onclick="order()">Оформить</button>
    <button class="btn" onclick="closeCart()">Закрыть</button>
  </div>
</div>

<!-- ADMIN -->
<div class="modal" id="admin">
  <div class="modalBox">
    <h3>Добавить товар</h3>
    <input id="name" placeholder="Название"><br><br>
    <input id="price" placeholder="Цена"><br><br>
    <input id="weight" placeholder="Вес"><br><br>

    <button class="btn" onclick="addProduct()">Добавить</button>
    <button class="btn" onclick="closeAdmin()">Закрыть</button>
  </div>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [
  {name:"AirPods Pro 2", price:156, weight:0.2},
  {name:"Nike Hoodie", price:45, weight:0.6},
  {name:"Jordan Shoes", price:210, weight:1.2},
  {name:"Smart Watch", price:120, weight:0.3}
];

let cart = [];

const grid = document.getElementById("grid");
const search = document.getElementById("search");

function render(list){
  grid.innerHTML="";

  list.forEach((p,i)=>{

    let d = Math.round(p.weight*50+15);
    let t = p.price+d;

    grid.innerHTML += `
      <div class="card">
        <div class="title">${p.name}</div>
        <div class="small">Цена: $${p.price}</div>
        <div class="small">Доставка: $${d}</div>
        <div class="total">Итого: $${t}</div>

        <div class="actions">
          <button class="btn add" onclick="add(${i})">В корзину</button>
        </div>
      </div>
    `;
  });
}

function add(i){
  cart.push(products[i]);
}

function openCart(){
  document.getElementById("cart").style.display="flex";
  renderCart();
}

function closeCart(){
  document.getElementById("cart").style.display="none";
}

function renderCart(){
  let box=document.getElementById("cartItems");
  box.innerHTML="";

  let sum=0;

  cart.forEach(p=>{
    let d=Math.round(p.weight*50+15);
    let t=p.price+d;
    sum+=t;

    box.innerHTML+=`<div class="item">${p.name} <b>$${t}</b></div>`;
  });

  document.getElementById("sum").innerHTML="ИТОГО: $"+sum;
}

function order(){

  let text="ONYX ORDER:%0A";

  cart.forEach(p=>{
    text+=`- ${p.name} $${p.price}%0A`;
  });

  window.open(`https://api.telegram.org/botTOKEN/sendMessage?chat_id=CHAT_ID&text=${text}`);
}

function openAdmin(){
  document.getElementById("admin").style.display="flex";
}

function closeAdmin(){
  document.getElementById("admin").style.display="none";
}

function addProduct(){
  let p={
    name:name.value,
    price:+price.value,
    weight:+weight.value
  };

  products.push(p);
  localStorage.setItem("products",JSON.stringify(products));

  render(products);
  closeAdmin();
}

render(products);

search.addEventListener("input",e=>{
  let v=e.target.value.toLowerCase();
  render(products.filter(p=>p.name.toLowerCase().includes(v)));
});

</script>

</body>
</html>
